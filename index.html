
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Job Discovery Dashboard</title>
<style>
body{font-family:Arial;background:#0b1120;color:#f8fafc;margin:0;padding:0}
.container{max-width:1200px;margin:auto;padding:24px}
button,a.action{padding:10px 12px;border-radius:8px;border:none;background:#2563eb;color:white;text-decoration:none;font-weight:bold;cursor:pointer;margin-right:6px}
.panel{background:#111827;border:1px solid #334155;border-radius:14px;padding:16px;margin-bottom:18px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px}
.job{background:#020617;border:1px solid #334155;border-radius:12px;padding:14px}
.meta{color:#94a3b8;font-size:13px}
</style>
</head>
<body>

<div class="container">

<h1>AI Job Discovery Dashboard</h1>

<div class="panel">
<button onclick="refreshJobs()">Refresh Jobs</button>
</div>

<div class="panel">
<h2>Live Jobs</h2>
<div id="jobs" class="cards"></div>
</div>

</div>

<script>

const LOCAL_FEED_PATH = "./jobs_feed.json";
const LIVE_FEED_URL = ""; 

let jobs = [];

async function loadJobs(){

try{
const res = await fetch(LOCAL_FEED_PATH,{cache:"no-store"});
if(res.ok){
const data = await res.json();
if(Array.isArray(data.jobs)){
return data.jobs;
}
}
}catch(e){}

if(LIVE_FEED_URL){
try{
const res = await fetch(LIVE_FEED_URL,{cache:"no-store"});
const data = await res.json();
if(Array.isArray(data.jobs)){
return data.jobs;
}
}catch(e){}
}

return [];
}

function render(){

const container = document.getElementById("jobs");

if(!jobs.length){
container.innerHTML = "<div>No jobs found. Connect a live feed.</div>";
return;
}

container.innerHTML = jobs.map(job=>`
<div class="job">
<strong>${job.company}</strong>
<h3>${job.title}</h3>
<div class="meta">${job.location}</div>
<br>
<a class="action" href="${job.descriptionUrl}" target="_blank">View Job</a>
<a class="action" href="${job.applyUrl}" target="_blank">Apply</a>
</div>
`).join("");

}

async function refreshJobs(){
jobs = await loadJobs();
render();
}

refreshJobs();

</script>

</body>
</html>
